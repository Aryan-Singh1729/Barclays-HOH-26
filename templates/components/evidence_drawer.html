<!-- Evidence Verification Drawer -->
<div id="evidence-drawer" class="fixed top-0 right-0 h-full w-[520px] bg-white border-l border-slate-200 shadow-[-4px_0_24px_rgba(0,0,0,0.08)] z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 bg-slate-50">
        <div>
            <div id="drawer-title" class="text-sm font-bold text-slate-800"></div>
            <div id="drawer-subtitle" class="text-xs text-slate-500 mt-0.5 font-mono"></div>
        </div>
        <button onclick="closeDrawer()" class="p-2 hover:bg-slate-200 rounded transition-colors cursor-pointer">
            <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
    <div id="drawer-content" class="flex-1 overflow-y-auto p-6 scrollbar-thin"></div>
</div>
<div id="drawer-overlay" class="fixed inset-0 bg-black/10 z-40 hidden" onclick="closeDrawer()"></div>
